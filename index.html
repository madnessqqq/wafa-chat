<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WAFA Chat</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>💬 WAFA Chat</h1>

<div class="auth">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Пароль">

<button id="register">
Регистрация
</button>

<button id="login">
Войти
</button>

</div>


<div id="userPanel" class="hidden">

<h2>
Добро пожаловать 👋
</h2>

<button id="openChat">
Открыть чат
</button>

<button id="logout">
Выйти
</button>

</div>


</div>


<script type="module" src="app.js"></script>


</body>
</html>
