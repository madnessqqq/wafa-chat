<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WAFA Chat</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="chat-app">


<div class="sidebar">

<h2>💬 WAFA</h2>


<input 
id="contactEmail" 
placeholder="Email контакта"
>


<button id="addContact">

➕ Добавить контакт

</button>


<h3>Мои чаты</h3>


<div id="contacts">

</div>


</div>

<h2>💬 WAFA</h2>


<button class="chat-item">
👤 Общий чат
</button>


<button class="chat-item">
👥 Группа
</button>


<button class="chat-item">
⭐ Избранное
</button>


</div>





<div class="chat-window">


<div class="chat-header">

WAFA Chat

</div>



<div id="messages">

</div>





<div class="send-box">


<input 
id="messageInput"
placeholder="Сообщение..."
>


<button id="send">

➤

</button>


</div>



<button id="logout">

Выйти

</button>


</div>


</div>



<script type="module" src="chat.js"></script>


</body>

</html>
